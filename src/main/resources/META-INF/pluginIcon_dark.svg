<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Tile background: a touch brighter so it doesn't disappear on charcoal -->
        <linearGradient id="bgDark" x1="6" y1="4" x2="34" y2="36" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#3A3770"/>
            <stop offset="1" stop-color="#4A4790"/>
        </linearGradient>

        <!-- Slightly stronger spectral sweep on the tile for dark mode -->
        <linearGradient id="sweepDark" x1="5" y1="30" x2="35" y2="10" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#00F5FF" stop-opacity="0.00"/>
            <stop offset="0.22" stop-color="#00F5FF" stop-opacity="0.22"/>
            <stop offset="0.45" stop-color="#A29BFE" stop-opacity="0.20"/>
            <stop offset="0.65" stop-color="#FF6BC1" stop-opacity="0.16"/>
            <stop offset="0.86" stop-color="#FFE08A" stop-opacity="0.12"/>
            <stop offset="1" stop-color="#FFE08A" stop-opacity="0.00"/>
        </linearGradient>

        <!-- Full-spectrum gradient for the hash (brighter stops for dark UI) -->
        <linearGradient id="hashSpectrumDark" x1="10" y1="10" x2="30" y2="30" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#A29BFE"/>
            <stop offset="0.30" stop-color="#00F5FF"/>
            <stop offset="0.55" stop-color="#FF6BC1"/>
            <stop offset="0.80" stop-color="#FFE08A"/>
            <stop offset="1" stop-color="#A29BFE"/>
        </linearGradient>

        <!-- Slightly stronger sheen -->
        <linearGradient id="hashSheenDark" x1="14" y1="12" x2="26" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
            <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- Rounded square tile -->
    <rect x="2" y="2" width="36" height="36" rx="8" fill="url(#bgDark)"/>

    <!-- Spectral sweep overlay -->
    <rect x="2" y="2" width="36" height="36" rx="8" fill="url(#sweepDark)"/>

    <!-- Hash -->
    <g transform="rotate(-3 20 20)">
        <g fill="url(#hashSpectrumDark)">
            <rect x="14.6" y="9.2" width="4.4" height="21.6" rx="2.2"/>
            <rect x="21.0" y="9.2" width="4.4" height="21.6" rx="2.2"/>
            <rect x="9.2" y="15.3" width="21.6" height="4.6" rx="2.3"/>
            <rect x="9.2" y="22.1" width="21.6" height="4.6" rx="2.3"/>
        </g>

        <g fill="url(#hashSheenDark)">
            <rect x="14.6" y="9.2" width="4.4" height="21.6" rx="2.2"/>
            <rect x="21.0" y="9.2" width="4.4" height="21.6" rx="2.2"/>
            <rect x="9.2" y="15.3" width="21.6" height="4.6" rx="2.3"/>
            <rect x="9.2" y="22.1" width="21.6" height="4.6" rx="2.3"/>
        </g>
    </g>
</svg>